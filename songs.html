<head>
<meta charset="UTF-8">

<title>Pompelup — Catalogue</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f0e8;font-family:system-ui,-apple-system,sans-serif;color:#1a1a2e}
header{background:#1a1a2e;color:#fff;padding:16px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
header h1{font-size:18px;font-weight:900;letter-spacing:.08em;flex:1}
.count{background:#F97316;color:#fff;padding:3px 10px;border-radius:20px;font-size:13px;font-weight:700;white-space:nowrap}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;padding:14px 24px;background:#fff;border-bottom:1px solid #e5e7eb;position:sticky;top:54px;z-index:99}
.toolbar input,.toolbar select{padding:8px 12px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;background:#fff;color:#1a1a2e}
.toolbar input{flex:1;min-width:160px}
.toolbar input:focus,.toolbar select:focus{outline:none;border-color:#F97316}
.stats{display:flex;gap:6px;flex-wrap:wrap;padding:12px 24px}
.chip{background:#fff;border:1.5px solid #e5e7eb;border-radius:20px;padding:4px 11px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover,.chip.active{background:#F97316;color:#fff;border-color:#F97316}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;padding:16px 24px 40px}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.12)}
.cover{width:100%;aspect-ratio:1;position:relative;overflow:hidden}
.cover img{width:100%;height:100%;object-fit:cover;display:block}
.fallback{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.fallback .em{font-size:40px}
.fallback .fa{font-size:10px;font-weight:600;color:#6b7280;text-align:center;padding:0 6px;line-height:1.3}
.gbadge{position:absolute;top:6px;right:6px;font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;color:#fff;letter-spacing:.03em}
.info{padding:9px 11px 11px}
.info .t{font-size:13px;font-weight:700;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.info .a{font-size:11px;color:#6b7280;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.info .m{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:#9ca3af}
.empty{text-align:center;padding:60px 20px;color:#9ca3af;font-size:15px;grid-column:1/-1}
.shimmer{background:linear-gradient(90deg,#f0ede8 25%,#e5e1d8 50%,#f0ede8 75%);background-size:200% 100%;animation:sh 1.4s infinite}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
@media(max-width:580px){.grid{grid-template-columns:repeat(2,1fr);gap:10px;padding:10px 12px 30px}.toolbar,.stats{padding-left:12px;padding-right:12px}}
</style>
</head>

  const c=document.createElement('div');c.className='chip';c.textContent=`${g} (${n})`;
  c.onclick=()=>{const f=document.getElementById('gf');const active=c.classList.contains('active');
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
    f.value=active?'':g;if(!active)c.classList.add('active');go();};
  sd.appendChild(c);
});

const cache={};
async function art(title,artist){
  const k=artist+'|'+title;
  if(k in cache)return cache[k];
  try{const r=await fetch('https://itunes.apple.com/search?term='+encodeURIComponent(artist+' '+title)+'&media=music&limit=1&entity=song');
    const d=await r.json();const u=d.results?.[0]?.artworkUrl100?.replace('100x100bb','300x300bb')||null;
    return(cache[k]=u);}catch{return(cache[k]=null);}
}

let activeFilter='';
function go(){
  const q=document.getElementById('q').value.toLowerCase();
  const gv=document.getElementById('gf').value;
  const dv=document.getElementById('df').value;
  const sv=document.getElementById('sf').value;
  let list=SONGS.filter(s=>{
    if(q&&!s.title.toLowerCase().includes(q)&&!s.artist.toLowerCase().includes(q))return false;
    if(gv&&s.genre!==gv)return false;
    if(dv){const d=Math.floor((s.year%100)/10)*10;
      const map={60:60,70:70,80:80,90:90,'00':0,'10':10,'20':20};
      if(d!==map[dv])return false;}
    return true;
  });
  if(sv==='t')list.sort((a,b)=>a.title.localeCompare(b.title));
  else if(sv==='a')list.sort((a,b)=>a.artist.localeCompare(b.artist));
  else if(sv==='y+')list.sort((a,b)=>a.year-b.year);
  else if(sv==='y-')list.sort((a,b)=>b.year-a.year);
  document.getElementById('cnt').textContent=list.length+' titres';
  render(list);
}

function render(list){
  const grid=document.getElementById('grid');
  if(!list.length){grid.innerHTML='<div class="empty">Aucun résultat 🎵</div>';return;}
  grid.innerHTML='';
  list.forEach((s,i)=>{
    const c=GC[s.genre]||'#6b7280';
    const card=document.createElement('div');card.className='card';
    card.innerHTML=`<div class="cover shimmer" id="c${s.id}"><div class="fallback" style="background:${s.color}18"><div class="em">${s.emoji}</div><div class="fa">${s.artist}</div></div><span class="gbadge" style="background:${c}">${s.genre}</span></div><div class="info"><div class="t" title="${s.title.replace(/"/g,'&quot;')}">${s.title}</div><div class="a">${s.artist}</div><div class="m"><span>${s.year}</span><span>${s.bpm} BPM</span></div></div>`;
    grid.appendChild(card);
    if(i<30)loadArt(s);else{
      const ob=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){loadArt(s);ob.disconnect();}});},{rootMargin:'300px'});
      ob.observe(card);
    }
  });
}

async function loadArt(s){
  const el=document.getElementById('c'+s.id);if(!el)return;
  const u=await art(s.title,s.artist);
  if(u&&el){const c=GC[s.genre]||'#6b7280';el.classList.remove('shimmer');el.innerHTML=`<img src="${u}" alt="" loading="lazy"><span class="gbadge" style="background:${c}">${s.genre}</span>`;}
  else if(el)el.classList.remove('shimmer');
}

go();
</script>
